<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body{
      background-color: blueviolet;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    button{
      border: 2px solid black;
      font-family:'Times New Roman', Times, serif;
      font-size: 50px;
      border-radius: 20px;
    }
    button:hover{
      background-color: blue;
      border: 2px solid red;
      box-shadow: 4px 4px 4px 4px black;
    }
    
  </style>
</head>

<body>
  <img src="" alt="">
  <h1></h1>
  <button>Check Your Image</button>



  <script>
    let image = document.querySelector("img")
    let heading = document.querySelector("h1")
    let btn = document.querySelector("button")
    // let name = prompt("Enter the Name [panda, kalu, snack, tabidar, tokaa, farrar]")
    // console.log(name);
    btn.addEventListener("click",()=>{
      let num = Math.ceil(Math.random()*6)
      if (num === 1) {
      image.src = "assests/haseeb.png"
      heading.textContent = "This is Kalu Boy"
    } else if (num === 2) {
      image.src = "assests/behroz.png"
      heading.textContent = "This is Panda Boy"
    }else if(num === 3){
      image.src = "assests/Sufyan.png"
      heading.textContent = "This is Eagle Boy"
    }else if (num === 4){
      image.src = "assests/sudais.png"
      heading.textContent = "This is Tabidar Boy"
    }else if(num === 5){
      image.src = "assests/jawad.png"
      heading.textContent = "This is Tokaa Boy"
    }else{
      image.src = "assests/saad.png"
      heading.textContent = "This is Syed farar Ali shah "
    }
    })
    
  </script>
</body>

</html>
